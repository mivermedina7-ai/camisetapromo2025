<div class="dashboard-grid">
  <article class="total-card">
    <span>Total registrados</span>
    <strong>{{ total }}</strong>
  </article>

  <section>
    <h3>Por genero</h3>
    <div class="stat-row" *ngFor="let item of porGenero">
      <span>{{ item.label }}</span>
      <strong>{{ item.value }}</strong>
    </div>
  </section>

  <section>
    <h3>Por talla</h3>
    <div class="stat-row" *ngFor="let item of porTalla">
      <span>{{ item.label }}</span>
      <strong>{{ item.value }}</strong>
    </div>
  </section>
</div>
